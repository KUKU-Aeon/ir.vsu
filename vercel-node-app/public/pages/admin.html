<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="user-scalable=no, width=device-width, height=device-height, initial-scale=1">
    <title>Редактор новостей</title>
    <link rel="icon" href="favicon/favicon.ico">
    <link rel="apple-touch-icon" href="favicon/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,400i&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/cardbanner.css">
    <script src="/js/script.js"></script>
</head>
<body>
<header>
    <a href="http://www.vsu.ru/"><img class="vsu_logo" src="img/vsu_logo-blue.svg"></a>
    <nav>
        <a href="index.html">новости</a>
        <a href="/pages/faculty.html">факультет</a>
        <a href="/pages/abitur.html">абитуриентам</a>
        <a href="/pages/education.html">студентам</a>
        <a href="/pages/science.html">наука</a>
        <a href="/pages/contacts.html">контакты</a>
    </nav>
    <a href="/pages/contacts.html"><img class="ir_logo" src="img/ir_logo.svg"></a>
</header>
<main>


            <div class="tabs">
                <div class="tabs__nav">
                    <button class="tabs__btn tabs__btn_active">Добавить запись в разделе новость</button>
                    <button class="tabs__btn">Добавит карту сотрудника</button>
                    <button class="tabs__btn">Добавит запись в разделе студентам</button>
                    <button class="tabs__btn">Добавит расписание в разделе студентам</button>
                </div>
                <div class="tabs__content">
                    <div class="tabs__pane tabs__pane_show">
                        <div class="banner">
                            <input type="file" accept = "image/*" id="banner-uploads" hidden>
                            <label for="banner-uploads" class="banner-upload-btn"><img src="img/upload.png"></label>
                        </div>
                        <div class="blog">
                            <textarea type="text" class="title" placeholder="Введите заголовок..."></textarea>
                            <textarea type="text" class="m_content" placeholder="Введите текст..."></textarea>
                        </div>
                        <div class="blog-options">
                            <button class="btn dark publish-btn" id="1">Опублликовать</button>
                            <input type="file" accept="*/*" id="image_upload" hidden>
                            <label for="image_upload" class="btn grey upload_btn">Добавить файл/изображение</label>
                    </div>
                </div>

                    <div class="tabs__pane">
                        <div class="card_editor">
                            <div class="card_banner"></div>
                            <div class="info">
                                <textarea type="text" class="name" placeholder="Введитя Ф.И.О."></textarea>
                                <textarea type="text" class="profession" placeholder="Введите должность/ научную степень"></textarea>
                                <textarea type="text" class="bio" placeholder="Введите дополнительную информацию"></textarea>
                                <textarea type="text" class="dissertations" placeholder="Список диссертаций"></textarea>
                                <textarea type="text" class="lang" placeholder="Знание языков"></textarea>
                                <textarea type="text" class="acad_pos" placeholder="Введите академическую позицию"></textarea>
                                <textarea type="text" class="education" placeholder="Введите информацию об образовании"></textarea>
                                <textarea type="text" class="SCI" placeholder="Введите сферу научных интересов"></textarea>
                                <textarea type="text" class="publications" placeholder="Введите информацию о публикациях"></textarea>
                                <textarea type="text" class="email" placeholder="Введите e-mail"></textarea>
                                <textarea type="text" class="per_site" placeholder="Введите ссылку на персональный сайт"></textarea>

                                <div class="card-image">
                                    <input type="file" accept = "image/*" id="card-uploads" hidden>
                                    <label for="card-uploads" class="card-upload-btn"><img src="img/upload.png"></label>
                                </div>
                            </div>
                            <div class="card-options">
                                <button class="btn dark publish-btn" id="2">Опублликовать</button>
                            </div>
                        </div>
                    </div>

                    <div class="tabs__pane">
                        <div class="student_news">
                            <textarea type="text" class="st_title" placeholder="Введите заголовок..."></textarea>
                            <textarea type="text" class="st_m_content" placeholder="Введите текст..."></textarea>
                            <input type="file"  name = "fileupl" id="file-upload" accept="*/*" formaction="/" formenctype="multipart/form-data" hidden multiple>
                            <label for="file-upload" class="file-upload-btn"><img src="img/upload.png"></label>
                        </div>
                        <div class="blog-options">
                            <button class="btn dark publish-btn" id="3">Опублликовать</button>
                        </div>
                    </div>

                    <div class="tabs__pane">
                        <div class="student_timetable">
                            <textarea type="text" class="st_m_content" placeholder="Введите текст..."></textarea>
                            <input type="file"  name = "fileupl" id="timetable-upload" accept="*/*" formaction="/" formenctype="multipart/form-data" hidden multiple>
                            <label for="file-upload" class="file-upload-btn"><img src="img/upload.png"></label>
                        </div>
                        <div class="blog-options">
                            <button class="btn dark publish-btn" id="4">Опублликовать</button>
                        </div>
                    </div>
            </div>
    </div>
</main>

</footer>

</body>
</html>
